<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hasil Analisis Kulit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.card{
background:white;
width:1000px;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
display:flex;
}

.left{
width:45%;
background:#f5faff;
}

.left img{
width:100%;
height:100%;
object-fit:cover;
}

.right{
width:55%;
padding:40px;
overflow-y:auto;
}

.title{
font-size:30px;
font-weight:700;
color:#1976D2;
margin-bottom:20px;
}

.skin{
background:#F4F8FF;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.skin h2{
font-size:35px;
color:#1976D2;
}

.confidence{
font-size:18px;
color:#666;
margin-top:10px;
}

.progress{
width:100%;
height:12px;
background:#dbeafe;
border-radius:10px;
margin-top:12px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#1976D2;
border-radius:10px;
}

.rekom{
margin-top:25px;
}

.rekom h3{
margin-bottom:15px;
color:#1976D2;
}

.skincare-card{
background:#F8FBFF;
padding:15px;
border-radius:12px;
margin-bottom:12px;
border-left:5px solid #1976D2;
}

.skincare-card h4{
color:#1976D2;
margin-bottom:6px;
font-size:16px;
}

.skincare-card p{
font-size:14px;
color:#555;
line-height:1.6;
}

.btn{
margin-top:20px;
display:inline-block;
padding:12px 25px;
background:#1976D2;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#1565C0;
transform:translateY(-2px);
}

</style>

</head>
<body>

<div class="card">

<div class="left">
<img src="{{ gambar }}">
</div>

<div class="right">

<div class="title">
Hasil Analisis Kulit
</div>

<div class="skin">

<h2>{{ hasil|upper }}</h2>

<div class="confidence">
Tingkat Keyakinan: {{ confidence }}%
</div>

<div class="progress">
<div class="progress-bar" style="width: {{ confidence }}%;"></div>
</div>

</div>

<div class="rekom">

<h3>Rekomendasi Basic Skincare</h3>

{% for nama, deskripsi in skincare %}

<div class="skincare-card">

<h4>🧴 {{ nama }}</h4>

<p>{{ deskripsi }}</p>

</div>

{% endfor %}

</div>

<a href="/" class="btn">
🔄 Analisis Lagi
</a>

</div>

</div>

</body>
</html>
